# AiPal mirror 的配置 (runnable version in ./mirror)

aipal.name=AiPal-mirror

# Use the real OPENAI_API_KEY from environment if present (Spring placeholder resolves ${ENV_VAR})
spring.ai.openai.api-key=${OPENAI_API_KEY}

spring.ai.openai.chat.options.model=gpt-5.4-nano

# Use a different port to avoid conflict with possible other servers
server.port=18080

# Optional: more verbose for seeing AI calls
logging.level.org.springframework.ai=DEBUG
